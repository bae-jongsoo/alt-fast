services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs

  trader:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: alt trader run
    env_file: .env
    depends_on:
      - db
      - redis

  market:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: alt market collect
    env_file: .env
    depends_on:
      - db
      - redis

  news:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: alt news collect
    env_file: .env
    depends_on:
      - db

  dart:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: alt dart collect
    env_file: .env
    depends_on:
      - db

  ws:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: alt ws subscribe
    env_file: .env
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alt
      POSTGRES_PASSWORD: alt
      POSTGRES_DB: alt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  frontend_build:
