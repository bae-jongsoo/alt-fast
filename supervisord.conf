[supervisord]
logfile=/var/log/alt-fast/supervisord.log
pidfile=/var/log/alt-fast/supervisord.pid
childlogdir=/var/log/alt-fast
nodaemon=false

[unix_http_server]
file=/var/log/alt-fast/supervisor.sock

[supervisorctl]
serverurl=unix:///var/log/alt-fast/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:api]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/api.log
stderr_logfile=/var/log/alt-fast/api.err.log

[program:news]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt news collect
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/news.log
stderr_logfile=/var/log/alt-fast/news.err.log

[program:market]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt market collect
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/market.log
stderr_logfile=/var/log/alt-fast/market.err.log

[program:dart]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt dart collect
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/dart.log
stderr_logfile=/var/log/alt-fast/dart.err.log

[program:trader-default]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt trader run --strategy default
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/trader-default.log
stderr_logfile=/var/log/alt-fast/trader-default.err.log

[program:ws]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt ws subscribe
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/ws.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/alt-fast/ws.err.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=2

[program:backfill-candles]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt backfill candles-scheduler
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/backfill-candles.log
stderr_logfile=/var/log/alt-fast/backfill-candles.err.log

[program:report-scheduler]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt review report-scheduler
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/report-scheduler.log
stderr_logfile=/var/log/alt-fast/report-scheduler.err.log

[program:macro]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt macro collect-scheduler
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/alt-fast/macro.log
stderr_logfile=/var/log/alt-fast/macro.err.log

[group:collectors]
programs=news,market,dart,ws,backfill-candles,report-scheduler,macro

[program:trader-event]
command=/Users/jongsoobae/workspace/alt-fast/backend/.venv/bin/alt trader run-event --strategy event_trader
directory=/Users/jongsoobae/workspace/alt-fast/backend
autostart=false
autorestart=true
stdout_logfile=/var/log/alt-fast/trader-event.log
stderr_logfile=/var/log/alt-fast/trader-event.err.log

[group:traders]
programs=trader-default,trader-event
